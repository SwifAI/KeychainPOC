name: KeychainPOC
options:
  bundleIdPrefix: com.poc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  KeychainPOC:
    type: application
    platform: iOS
    sources:
      - KeychainPOC
    settings:
      base:
        INFOPLIST_FILE: KeychainPOC/Info.plist
        CODE_SIGN_ENTITLEMENTS: KeychainPOC/KeychainPOC.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.poc.KeychainPOC
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
